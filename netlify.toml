# AXRIK site — Netlify configuration (repo root)
# The deployable site lives in website/; functions live inside it too.

[build]
  publish = "website"
  functions = "website/netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
